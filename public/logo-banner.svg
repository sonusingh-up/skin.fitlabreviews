<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <rect width="1200" height="300" fill="#F0ECE4"/>
  <!-- FITLAB wordmark -->
  <text
    x="600"
    y="190"
    font-family="Arial Black, Impact, 'Franklin Gothic Heavy', sans-serif"
    font-weight="900"
    font-size="200"
    letter-spacing="-4"
    text-anchor="middle"
    fill="#1A1714"
  >FITLAB</text>
  <!-- Left rule -->
  <line x1="220" y1="240" x2="380" y2="240" stroke="#9A9080" stroke-width="1.5"/>
  <!-- REVIEWS text -->
  <text
    x="430"
    y="248"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="22"
    letter-spacing="7"
