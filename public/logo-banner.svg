    fill="#6B6258"
  >REVIEWS</text>
  <!-- Rust dot -->
  <circle cx="600" cy="241" r="5" fill="#C4622D"/>
  <!-- NO BIAS text -->
  <text
    x="617"
    y="248"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="22"
    letter-spacing="7"
    text-anchor="start"
    fill="#6B6258"
  >NO BIAS</text>
  <!-- Right rule -->
  <line x1="820" y1="240" x2="980" y2="240" stroke="#9A9080" stroke-width="1.5"/>
